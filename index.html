<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wedding Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3EC;
    --card:#FFFDF8;
    --burgundy:#7A2638;
    --burgundy-deep:#4A1421;
    --gold:#B08A3C;
    --gold-soft:#E5DFD2;
    --rose:#9C3D2E;
    --ink:#2B2A26;
    --muted:#8B8578;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Jost',sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
  input{font-family:inherit}

  /* ---------- header ---------- */
  .hdr{
    background:var(--burgundy-deep);
    color:#F3EFE4;
    text-align:center;
    padding:20px 16px 0;
  }
  .hdr h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-size:30px;
    letter-spacing:.04em;
  }
  .hdr .seated{
    font-size:12px;
    letter-spacing:.08em;
    color:#E8D9AE;
    margin-top:8px;
  }
  .tabs{display:flex;margin-top:14px}
  .tabs button{
    flex:1;
    padding:11px 0 13px;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#B9AF97;
    border-bottom:2px solid transparent;
  }
  .tabs button.on{color:#fff;border-bottom-color:var(--gold)}

  main{padding:16px 14px 90px;max-width:560px;margin:0 auto}

  /* ---------- floor plan ---------- */
  .plan{
    position:relative;
    width:100%;
    aspect-ratio:1.12/1;
    background:var(--card);
    border:1px solid var(--gold-soft);
    border-radius:14px;
    overflow:hidden;
  }
  .fixture{
    position:absolute;
    transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;
    font-size:9px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);
    background:var(--paper);
    border:1px solid var(--gold-soft);
    border-radius:8px;
    text-align:center;line-height:1.3;
    padding:2px;
  }
  .fixture.dance{
    border:1.5px dashed var(--gold);
    background:transparent;
    color:var(--gold);
    border-radius:10px;
  }
  .fixture.sweetheart{
    background:var(--burgundy);
    color:#F3EFE4;
    border-color:var(--burgundy-deep);
    border-radius:999px;
  }
  .table{
    position:absolute;
    transform:translate(-50%,-50%);
    width:11.5%;
    aspect-ratio:1;
    border-radius:50%;
    padding:3px;
    background:conic-gradient(var(--gold) calc(var(--fill)*1%), var(--gold-soft) 0);
    box-shadow:0 1px 4px rgba(43,42,38,.08);
  }
  .table-in{
    width:100%;height:100%;
    border-radius:50%;
    background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0;
  }
  .table.full .table-in{background:var(--burgundy);color:#fff}
  .table .num{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;line-height:1}
  .table .cnt{font-size:8.5px;letter-spacing:.06em;color:var(--muted);margin-top:2px}
  .table.full .cnt{color:#CBE0D2}
  .legend{
    display:flex;gap:16px;justify-content:center;
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    margin-top:12px;
  }
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}
  .ref-btn{
    display:block;
    margin:14px auto 0;
    padding:10px 16px;
    border:1px solid var(--burgundy);
    border-radius:999px;
    color:var(--burgundy);
    background:var(--card);
    font-size:11px;
    letter-spacing:.1em;
    text-transform:uppercase;
  }

  /* ---------- guest list ---------- */
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .search{
    flex:1;
    padding:11px 14px;
    border:1px solid var(--gold-soft);
    border-radius:999px;
    background:var(--card);
    font-size:14px;
    outline:none;
  }
  .search:focus{border-color:var(--gold)}
  .chip{
    padding:0 14px;
    border:1px solid var(--gold-soft);
    border-radius:999px;
    background:var(--card);
    font-size:11px;letter-spacing:.06em;
    color:var(--muted);
    white-space:nowrap;
  }
  .chip.on{background:var(--burgundy);border-color:var(--burgundy);color:#fff}
  .ggroup{
    font-family:'Cormorant Garamond',serif;
    font-size:17px;font-weight:600;
    color:var(--burgundy-deep);
    margin:18px 2px 6px;
  }
  .grow{
    display:flex;align-items:center;gap:10px;
    background:var(--card);
    border:1px solid var(--gold-soft);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:6px;
  }
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .gname{flex:1;font-size:14.5px}
  .gname small{display:block;font-size:10.5px;color:var(--muted);letter-spacing:.04em}
  .tag{
    font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    padding:2.5px 7px;border-radius:999px;flex:none;
  }
  .tag.maybe{background:#F0E7CF;color:#8A6C25}
  .tag.unlikely{background:#EFE0DC;color:var(--rose)}
  .seatbtn{
    flex:none;
    font-size:11px;letter-spacing:.06em;
    padding:5px 11px;border-radius:999px;
  }
  .seatbtn.at{background:var(--burgundy);color:#fff}
  .seatbtn.free{color:var(--muted);border:1px dashed var(--gold-soft)}
  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
  .btn{
    flex:1;min-width:130px;
    padding:12px 10px;
    border-radius:10px;
    font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--burgundy);
    color:var(--burgundy);
    background:var(--card);
  }
  .btn.danger{border-color:var(--rose);color:var(--rose)}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:13px}

  /* ---------- bottom sheet ---------- */
  .scrim{
    position:fixed;inset:0;
    background:rgba(74,20,33,.48);
    z-index:10;
  }
  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    z-index:11;
    background:var(--card);
    border-radius:18px 18px 0 0;
    max-height:78vh;
    display:flex;flex-direction:column;
    box-shadow:0 -6px 30px rgba(74,20,33,.25);
    max-width:560px;margin:0 auto;
  }
  .sheet-hd{
    padding:16px 18px 10px;
    border-bottom:1px solid var(--gold-soft);
  }
  .sheet-hd .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .sheet-hd h2{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;font-weight:600;color:var(--burgundy-deep);
  }
  .sheet-hd .meta{font-size:11.5px;letter-spacing:.08em;color:var(--muted);margin-top:2px}
  .xbtn{
    width:32px;height:32px;border-radius:50%;
    background:var(--paper);color:var(--muted);
    font-size:15px;flex:none;
  }
  .cap{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:12px;color:var(--muted);letter-spacing:.06em}
  .cap button{
    width:28px;height:28px;border-radius:50%;
    border:1px solid var(--gold-soft);
    font-size:15px;color:var(--burgundy);
    line-height:1;
  }
  .cap button:disabled{opacity:.3}
  .cap b{color:var(--ink);font-weight:500}
  .sheet-body{overflow-y:auto;padding:12px 18px 26px;-webkit-overflow-scrolling:touch}
  .srow{
    display:flex;align-items:center;gap:10px;
    padding:9px 0;
    border-bottom:1px solid #F0EBDE;
    font-size:14.5px;
  }
  .srow .rm{color:var(--rose);font-size:11px;letter-spacing:.08em;padding:5px 8px}
  .addbtn{
    width:100%;
    margin-top:14px;
    padding:13px;
    border-radius:10px;
    background:var(--burgundy);color:#fff;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  }
  .addbtn:disabled{background:var(--gold-soft);color:var(--muted)}
  .backlink{font-size:12px;letter-spacing:.08em;color:var(--gold);padding:4px 0}

  /* ---------- passphrase gate ---------- */
  .gate{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:var(--burgundy-deep);
    padding:24px;
  }
  .gate-card{width:100%;max-width:340px;text-align:center;color:#F3EFE4}
  .gate-card h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;font-size:34px;letter-spacing:.04em;
  }
  .gate-sub{
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:#C9BFA8;margin:6px 0 28px;
  }
  .gate-in{
    width:100%;
    padding:13px 16px;
    border:1px solid rgba(229,223,210,.35);
    border-radius:999px;
    background:rgba(255,253,248,.06);
    color:#F3EFE4;
    font-size:15px;text-align:center;letter-spacing:.06em;
    outline:none;
  }
  .gate-in::placeholder{color:#8FA396}
  .gate-in:focus{border-color:var(--gold)}
  .gate-err{min-height:18px;font-size:12px;color:#E8B4A8;margin-top:10px;letter-spacing:.04em}
  .gate-btn{
    width:100%;
    margin-top:6px;
    padding:13px;
    border-radius:999px;
    background:var(--gold);color:var(--burgundy-deep);
    font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    font-weight:600;
  }

  /* ---------- original floor-plan viewer ---------- */
  .ref-modal{
    position:fixed;inset:0;z-index:30;
    display:flex;align-items:center;justify-content:center;
    padding:16px;
    background:rgba(31,12,17,.82);
  }
  .ref-card{
    width:min(760px,100%);
    max-height:92vh;
    display:flex;flex-direction:column;
    overflow:hidden;
    border-radius:14px;
    background:var(--card);
    box-shadow:0 18px 60px rgba(0,0,0,.35);
  }
  .ref-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--gold-soft)}
  .ref-hd h2{font-family:'Cormorant Garamond',serif;font-size:21px;color:var(--burgundy-deep)}
  .ref-scroll{overflow:auto;padding:10px;-webkit-overflow-scrolling:touch}
  .ref-scroll img{display:block;width:100%;height:auto}
  .ref-hint{text-align:center;padding:0 12px 12px;color:var(--muted);font-size:11px}
  .seed-body{padding:16px}
  .seed-body p{font-size:12px;line-height:1.5;color:var(--muted);margin-bottom:10px}
  .seed-box{
    width:100%;min-height:132px;resize:vertical;
    padding:11px;border:1px solid var(--gold-soft);border-radius:9px;
    background:var(--paper);color:var(--ink);
    font:11px/1.45 ui-monospace,SFMono-Regular,Menlo,monospace;
    overflow-wrap:anywhere;outline:none;
  }
  .seed-box:focus{border-color:var(--gold)}
  .seed-error{min-height:18px;margin-top:8px;color:var(--rose);font-size:11px}
  .seed-actions{display:flex;gap:8px;margin-top:8px}
  .seed-actions .btn{min-width:0}
</style>
</head>

/* ---------------- helpers ---------------- */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function seatedAt(){                       // guestIdx -> tableId
  const m = {};
  for (const t in state.assignments) for (const g of state.assignments[t]) m[g] = +t;
  return m;
}
function tableGuests(id){ return state.assignments[id] || []; }
function tableCap(id){ return state.capacities[id] || DEFAULT_CAP; }
function seatedCount(){ return Object.values(state.assignments).reduce((n,a)=>n+a.length,0); }
function guestName(i){ return (GUESTS[i][0] + ' ' + GUESTS[i][1]).trim(); }

/* ---------------- passphrase gate ---------------- */
async function decryptGuests(pass){
  const norm = pass.trim().toLowerCase();
  const keyBytes = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(norm));
  const key = await crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['decrypt']);
  const data = Uint8Array.from(atob(ENC), c => c.charCodeAt(0));
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:data.slice(0,12)}, key, data.slice(12));
  return { norm, text: new TextDecoder().decode(plain) };
}

async function unlock(pass){
  const { norm, text } = await decryptGuests(pass);
  GUESTS = text.trim().split('\n').map(l => l.split(',').map(s => s.trim()));
  unlocked = true;
  localStorage.setItem(PASS_KEY, norm);
}

function gateHTML(){
  return `
    <div class="gate">

        <h1>Wedding Planning</h1>
        <div class="gate-sub">Seating Chart</div>
        <form onsubmit="gateSubmit(event)">
          <input class="gate-in" id="gateInput" type="password" placeholder="Passphrase" autocomplete="off">
          <div class="gate-err" id="gateErr"></div>
          <button class="gate-btn" type="submit">Enter</button>
        </form>
      </div>
    </div>`;
}

window.gateSubmit = async e => {
  e.preventDefault();
  const input = document.getElementById('gateInput');
  const err = document.getElementById('gateErr');
  if (!(window.crypto && crypto.subtle)){
    err.textContent = 'This page needs to be opened over HTTPS.';
    return;
  }
  try {
    await unlock(input.value);
    render();
  } catch(ex){
    err.textContent = 'That’s not it — try again.';
    input.value = '';
    input.focus();
  }
};

/* ---------------- rendering ---------------- */
function render(){
  const app = document.getElementById('app');
  if (!unlocked){
    app.innerHTML = gateHTML();
    const i = document.getElementById('gateInput');
    if (i) i.focus();
    return;
  }
  app.innerHTML = `
    <header class="hdr">
      <h1>Wedding Planning</h1>
      <div class="seated">${seatedCount()} of ${GUESTS.length} guests seated</div>
      <nav class="tabs">
        <button class="${ui.view==='floor'?'on':''}" onclick="showView('floor')">Floor Plan</button>
        <button class="${ui.view==='guests'?'on':''}" onclick="showView('guests')">Guest List</button>
      </nav>
    </header>
    <main>${ui.view==='floor' ? floorHTML() : guestsHTML()}</main>
    ${sheetHTML()}
    ${referenceHTML()}
    ${seedHTML()}
  `;
}

function floorHTML(){
  const fixtures = FIXTURES.map(f => `
    <div class="fixture ${f.cls}" style="left:${f.x}%;top:${f.y}%;width:${f.w}%;height:${f.h}%">${f.label}</div>
  `).join('');
  const tables = TABLES.map(t => {
    const n = tableGuests(t.id).length, cap = tableCap(t.id);
    const fill = Math.min(100, Math.round(n/cap*100));
    return `
      <button class="table ${n>=cap?'full':''}" style="left:${t.x}%;top:${t.y}%;--fill:${fill}" onclick="openTable(${t.id})">
        <span class="table-in">
          <span class="num">${t.id}</span>
          <span class="cnt">${n}/${cap}</span>
        </span>
      </button>`;
  }).join('');
  return `
    <div class="plan">${fixtures}${tables}</div>
    <div class="legend">
      <span><i style="background:${SIDE_COLOR.B}"></i>Bride</span>
      <span><i style="background:${SIDE_COLOR.G}"></i>Groom</span>
      <span><i style="background:${SIDE_COLOR.M}"></i>Mutual</span>
    </div>
    <button class="ref-btn" onclick="openReference()">View original floor plan</button>`;
}

function referenceHTML(){

      </div>
    </div>`;
}

function guestRowsHTML(){
  const at = seatedAt();
  const q = ui.listSearch.toLowerCase();
  let html = '', lastGroup = null, shown = 0;
  GUESTS.forEach((g,i) => {
    if (ui.hideUnlikely && g[4]==='U') return;
    if (q && !(g[0]+' '+g[1]+' '+g[2]).toLowerCase().includes(q)) return;
    if (g[2] !== lastGroup){ html += `<div class="ggroup">${esc(g[2])}</div>`; lastGroup = g[2]; }
    const t = at[i];
    html += `
      <div class="grow">
        <span class="dot" style="background:${SIDE_COLOR[g[3]]}"></span>
        <span class="gname">${esc(g[0])} ${esc(g[1])}<small>${SIDE_NAME[g[3]]}</small></span>
        ${g[4]==='M' ? '<span class="tag maybe">Maybe</span>' : ''}
        ${g[4]==='U' ? '<span class="tag unlikely">Unlikely</span>' : ''}
        ${t ? `<button class="seatbtn at" onclick="unseat(${i})">Table ${t}</button>`
            : `<span class="seatbtn free">Unseated</span>`}
      </div>`;
    shown++;
  });
  return shown ? html : '<div class="empty">No guests match.</div>';
}

/* ---------------- compact save codes ---------------- */
function guestListFingerprint(){
  let hash = 2166136261;
  const text = GUESTS.map(g => g[0]+'\u001f'+g[1]).join('\u001e');
  for (let i=0; i<text.length; i++){
    hash ^= text.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return (hash >>> 0).toString(36);
}

function makeSeed(){
  const payload = {
    v:1,
    g:guestListFingerprint(),
    a:Object.entries(state.assignments)
      .filter(([,guests]) => guests.length)
      .map(([table,guests]) => [+table, ...guests]),
    c:Object.entries(state.capacities)
      .filter(([,cap]) => cap !== DEFAULT_CAP)
      .map(([table,cap]) => [+table, cap])
  };
  return btoa(JSON.stringify(payload)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function parseSeed(raw){
  const clean = raw.trim().replace(/\s/g,'').replace(/-/g,'+').replace(/_/g,'/');
  const json = atob(clean + '='.repeat((4-clean.length%4)%4));
  const data = JSON.parse(json);
  if (!data || data.v !== 1 || !Array.isArray(data.a) || !Array.isArray(data.c)) throw new Error('Invalid save code.');
  if (data.g !== guestListFingerprint()) throw new Error('This code was created for a different guest list.');

  const validTables = new Set(TABLES.map(t => t.id));
  const assignments = {}, capacities = {}, usedGuests = new Set(), usedTables = new Set(), capacityTables = new Set();
  for (const row of data.c){
    if (!Array.isArray(row) || row.length !== 2) throw new Error('Invalid table capacity data.');
    const [table,cap] = row;
    if (!validTables.has(table) || capacityTables.has(table) || !Number.isInteger(cap) || cap < 1 || cap > MAX_CAP) throw new Error('Invalid table capacity data.');
    capacityTables.add(table);
    capacities[table] = cap;
  }
  for (const row of data.a){
    if (!Array.isArray(row) || row.length < 2 || !validTables.has(row[0]) || usedTables.has(row[0])) throw new Error('Invalid seating data.');
    const table = row[0], guests = row.slice(1);
    usedTables.add(table);
    const cap = capacities[table] || DEFAULT_CAP;
    if (guests.length > cap) throw new Error(`Table ${table} is over capacity.`);
    for (const guest of guests){
      if (!Number.isInteger(guest) || guest < 0 || guest >= GUESTS.length || usedGuests.has(guest)) throw new Error('Invalid or duplicate guest assignment.');
      usedGuests.add(guest);
    }
    assignments[table] = guests;
  }
  return { assignments, capacities };
}

function seedHTML(){
  if (!ui.seedMode) return '';
  const saving = ui.seedMode === 'save';
  return `
    <div class="ref-modal" onclick="closeSeed()" role="dialog" aria-modal="true" aria-label="${saving?'Save':'Load'} seating code">
      <div class="ref-card" onclick="event.stopPropagation()">
        <div class="ref-hd">
          <h2>${saving?'Save Seating Arrangement':'Load Seating Arrangement'}</h2>
          <button class="xbtn" onclick="closeSeed()" aria-label="Close">&#10005;</button>
        </div>
        <div class="seed-body">
          <p>${saving
            ? 'Copy and keep this code. It contains the table assignments, but no guest names or passphrase.'
            : 'Paste a previously saved code. Loading it will replace the current seating arrangement.'}</p>
          <textarea class="seed-box" id="seedBox" ${saving?'readonly':''}
            placeholder="Paste your seating code here" oninput="ui.seedText=this.value">${esc(ui.seedText)}</textarea>
          <div class="seed-error" id="seedError">${esc(ui.seedError)}</div>
          <div class="seed-actions">
            ${saving
              ? '<button class="btn" id="copySeedBtn" onclick="copySeed()">Copy code</button>'
              : '<button class="btn" onclick="loadSeed()">Load arrangement</button>'}
            <button class="btn" onclick="closeSeed()">Cancel</button>
          </div>
        </div>
      </div>
    </div>`;
}

/* ---------------- bottom sheet ---------------- */
function sheetHTML(){
  if (!ui.sheet) return '';
  const id = ui.table;
  let body;
  if (ui.sheet === 'table'){
    const guests = tableGuests(id), cap = tableCap(id);
    const rows = guests.map(i => {
      const g = GUESTS[i];
      return `
        <div class="srow">
          <span class="dot" style="background:${SIDE_COLOR[g[3]]}"></span>
          <span class="gname">${esc(guestName(i))}<small>${esc(g[2])}</small></span>
          <button class="rm" onclick="unseat(${i})">Unseat</button>
        </div>`;
    }).join('') || '<div class="empty">No one seated yet.</div>';
    body = `
      <div class="sheet-hd">
        <div class="row">
          <div>
            <h2>Table ${id}</h2>
            <div class="meta">${guests.length} of ${cap} seats filled</div>
          </div>
          <button class="xbtn" onclick="closeSheet()">&#10005;</button>
        </div>
        <div class="cap">
          Capacity
          <button onclick="capChange(-1)" ${cap<=Math.max(1,guests.length)?'disabled':''}>&minus;</button>
          <b>${cap}</b>
          <button onclick="capChange(1)" ${cap>=MAX_CAP?'disabled':''}>+</button>
        </div>
      </div>
      <div class="sheet-body">
        ${rows}
        <button class="addbtn" onclick="openPicker()" ${guests.length>=cap?'disabled':''}>
          ${guests.length>=cap ? 'Table full' : 'Add guests'}
        </button>
      </div>`;
  } else { // picker
    body = `
      <div class="sheet-hd">
        <div class="row">
          <div>
            <button class="backlink" onclick="openTable(${id})">&larr; Table ${id}</button>
            <h2>Add guests</h2>
            <div class="meta">${tableGuests(id).length} of ${tableCap(id)} seats filled</div>
          </div>
          <button class="xbtn" onclick="closeSheet()">&#10005;</button>
        </div>
        <input class="search" id="pickerSearch" type="search" placeholder="Search unseated guests&hellip;"
               style="margin-top:10px;width:100%" value="${esc(ui.pickerSearch)}" oninput="onPickerSearch(this.value)">
      </div>
      <div class="sheet-body" id="pickerList">${pickerListHTML()}</div>`;
  }
  return `<div class="scrim" onclick="closeSheet()"></div><div class="sheet">${body}</div>`;
}

function pickerListHTML(){
  const at = seatedAt();
  const q = ui.pickerSearch.toLowerCase();
  let html = '', lastGroup = null, shown = 0;
  GUESTS.forEach((g,i) => {
    if (at[i] !== undefined) return;
    if (q && !(g[0]+' '+g[1]+' '+g[2]).toLowerCase().includes(q)) return;
    if (g[2] !== lastGroup){ html += `<div class="ggroup">${esc(g[2])}</div>`; lastGroup = g[2]; }
    html += `
      <div class="grow" onclick="seat(${i})" style="cursor:pointer">
        <span class="dot" style="background:${SIDE_COLOR[g[3]]}"></span>
        <span class="gname">${esc(g[0])} ${esc(g[1])}<small>${SIDE_NAME[g[3]]}</small></span>
        ${g[4]==='M' ? '<span class="tag maybe">Maybe</span>' : ''}
        ${g[4]==='U' ? '<span class="tag unlikely">Unlikely</span>' : ''}
      </div>`;
    shown++;
  });
  return shown ? html : '<div class="empty">Everyone matching is already seated.</div>';
}

/* ---------------- actions (global for onclick) ---------------- */
window.showView = v => { ui.view = v; ui.listSearch=''; render(); };
window.openTable = id => { ui.sheet='table'; ui.table=id; ui.pickerSearch=''; render(); };
window.closeSheet = () => { ui.sheet=null; ui.table=null; render(); };
window.openPicker = () => { ui.sheet='picker'; ui.pickerSearch=''; render(); const s=document.getElementById('pickerSearch'); if(s) s.focus(); };
window.openReference = () => { ui.reference=true; render(); };
window.closeReference = () => { ui.reference=false; render(); };
window.openSeedSave = () => { ui.seedMode='save'; ui.seedText=makeSeed(); ui.seedError=''; render(); };
window.openSeedLoad = () => { ui.seedMode='load'; ui.seedText=''; ui.seedError=''; render(); const box=document.getElementById('seedBox'); if(box) box.focus(); };
window.closeSeed = () => { ui.seedMode=null; ui.seedText=''; ui.seedError=''; render(); };

window.copySeed = async () => {
  const box = document.getElementById('seedBox');
  const btn = document.getElementById('copySeedBtn');
  try {
    await navigator.clipboard.writeText(box.value);
  } catch(e){
    box.focus(); box.select();
    document.execCommand('copy');
  }
  if (btn){ btn.textContent='Copied!'; setTimeout(() => { if(btn) btn.textContent='Copy code'; }, 1500); }
};

window.loadSeed = () => {
  try {
    const next = parseSeed(document.getElementById('seedBox').value);
    if (!confirm('Replace the current seating plan with this saved arrangement?')) return;
    state = next;
    flushSave();
    ui.seedMode=null; ui.seedText=''; ui.seedError='';
    render();
  } catch(e){
    ui.seedError = e.message || 'Could not read that save code.';
    const err = document.getElementById('seedError');
    if (err) err.textContent = ui.seedError;
  }
};

window.seat = i => {
  const id = ui.table;
  if (!id) return;
  const arr = state.assignments[id] || (state.assignments[id]=[]);
  if (arr.length >= tableCap(id)) { window.openTable(id); return; }
  if (!arr.includes(i)) arr.push(i);
  save();
  if (arr.length >= tableCap(id)) window.openTable(id);   // table filled — back to table view
  else {
    // stay in picker; refresh the list + seat count without losing search focus
    document.getElementById('pickerList').innerHTML = pickerListHTML();
    const meta = document.querySelector('.sheet .meta');
    if (meta) meta.textContent = `${arr.length} of ${tableCap(id)} seats filled`;
    const hdrCount = document.querySelector('.hdr .seated');
    if (hdrCount) hdrCount.textContent = `${seatedCount()} of ${GUESTS.length} guests seated`;
  }
};

window.unseat = i => {
  if (!confirm(`Unseat ${guestName(i)}?`)) return;
  for (const t in state.assignments){
    const k = state.assignments[t].indexOf(i);
    if (k > -1){ state.assignments[t].splice(k,1); if(!state.assignments[t].length) delete state.assignments[t]; }
  }
  save(); render();
};

window.capChange = d => {
  const id = ui.table;
  const next = Math.min(MAX_CAP, Math.max(Math.max(1, tableGuests(id).length), tableCap(id)+d));
  state.capacities[id] = next;
  save(); render();
};

window.toggleUnlikely = () => { ui.hideUnlikely = !ui.hideUnlikely; render(); };

window.onListSearch = v => {
  ui.listSearch = v;
  document.getElementById('guestRows').innerHTML = guestRowsHTML();
};
window.onPickerSearch = v => {
  ui.pickerSearch = v;
  document.getElementById('pickerList').innerHTML = pickerListHTML();
};

window.clearAll = () => {
  if (!confirm('Clear ALL seating assignments? This cannot be undone.')) return;
  state.assignments = {};
  save(); render();
};

/* export / import — assignments stored by guest NAME so snapshots survive
   reordering of the guest list */
window.exportJSON = () => {
  const out = { v:1, exported:new Date().toISOString(), capacities:state.capacities, assignments:{} };
  for (const t in state.assignments) out.assignments[t] = state.assignments[t].map(guestName);
  const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wong-roa-seating.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || typeof data.assignments !== 'object') throw new Error('bad format');
      const byName = {};
      GUESTS.forEach((g,i) => byName[g[0]+' '+g[1]] = i);
      const assignments = {}, missing = [];
      for (const t in data.assignments){
        const idxs = [];
        for (const name of data.assignments[t]){
          if (byName[name] !== undefined) idxs.push(byName[name]);
          else missing.push(name);
        }
        if (idxs.length) assignments[t] = idxs;
      }
      if (!confirm('Replace the current seating plan with the imported one?')) return;
      state.assignments = assignments;
      state.capacities = (data.capacities && typeof data.capacities==='object') ? data.capacities : {};
      save(); render();
      if (missing.length) alert('Not found in guest list (skipped):\n' + missing.join('\n'));
    } catch(err){
      alert('Could not read that file — it doesn’t look like a seating export.');
    }
  };
  reader.readAsText(file);
});

/* boot: silently unlock with the remembered passphrase, else show the gate */
(async () => {
  const saved = localStorage.getItem(PASS_KEY);
  if (saved && window.crypto && crypto.subtle){
    try { await unlock(saved); }
    catch(e){ localStorage.removeItem(PASS_KEY); }
  }
  render();
})();
</script>
</body>
</html>
