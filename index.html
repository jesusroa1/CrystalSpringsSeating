<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wong&ndash;Roa Seating Chart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F3EC;
    --card:#FFFDF8;
    --emerald:#1F5A40;
    --emerald-deep:#123726;
    --gold:#B08A3C;
    --gold-soft:#E5DFD2;
    --rose:#9C3D2E;
    --ink:#2B2A26;
    --muted:#8B8578;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Jost',sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
  input{font-family:inherit}

  /* ---------- header ---------- */
  .hdr{
    background:var(--emerald-deep);
    color:#F3EFE4;
    text-align:center;
    padding:20px 16px 0;
  }
  .hdr h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-size:30px;
    letter-spacing:.04em;
  }
  .hdr h1 .amp{color:var(--gold);font-style:italic}
  .hdr .sub{
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:#C9BFA8;
    margin-top:4px;
  }
  .hdr .seated{
    font-size:12px;
    letter-spacing:.08em;
    color:#E8D9AE;
    margin-top:8px;
  }
  .tabs{display:flex;margin-top:14px}
  .tabs button{
    flex:1;
    padding:11px 0 13px;
    font-size:12px;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:#B9AF97;
    border-bottom:2px solid transparent;
  }
  .tabs button.on{color:#fff;border-bottom-color:var(--gold)}

  main{padding:16px 14px 90px;max-width:560px;margin:0 auto}

  /* ---------- floor plan ---------- */
  .plan{
    position:relative;
    width:100%;
    aspect-ratio:3/4.4;
    background:var(--card);
    border:1px solid var(--gold-soft);
    border-radius:14px;
    overflow:hidden;
  }
  .fixture{
    position:absolute;
    transform:translate(-50%,-50%);
    display:flex;align-items:center;justify-content:center;
    font-size:9px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--muted);
    background:var(--paper);
    border:1px solid var(--gold-soft);
    border-radius:8px;
    text-align:center;line-height:1.3;
    padding:2px;
  }
  .fixture.dance{
    border:1.5px dashed var(--gold);
    background:transparent;
    color:var(--gold);
    border-radius:10px;
  }
  .fixture.sweetheart{
    background:var(--emerald);
    color:#F3EFE4;
    border-color:var(--emerald-deep);
    border-radius:999px;
  }
  .table{
    position:absolute;
    transform:translate(-50%,-50%);
    width:16.5%;
    aspect-ratio:1;
    border-radius:50%;
    padding:3px;
    background:conic-gradient(var(--gold) calc(var(--fill)*1%), var(--gold-soft) 0);
    box-shadow:0 1px 4px rgba(43,42,38,.08);
  }
  .table-in{
    width:100%;height:100%;
    border-radius:50%;
    background:var(--card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:0;
  }
  .table.full .table-in{background:var(--emerald);color:#fff}
  .table .num{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;line-height:1}
  .table .cnt{font-size:8.5px;letter-spacing:.06em;color:var(--muted);margin-top:2px}
  .table.full .cnt{color:#CBE0D2}
  .legend{
    display:flex;gap:16px;justify-content:center;
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
    margin-top:12px;
  }
  .legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:-1px}

  /* ---------- guest list ---------- */
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .search{
    flex:1;
    padding:11px 14px;
    border:1px solid var(--gold-soft);
    border-radius:999px;
    background:var(--card);
    font-size:14px;
    outline:none;
  }
  .search:focus{border-color:var(--gold)}
  .chip{
    padding:0 14px;
    border:1px solid var(--gold-soft);
    border-radius:999px;
    background:var(--card);
    font-size:11px;letter-spacing:.06em;
    color:var(--muted);
    white-space:nowrap;
  }
  .chip.on{background:var(--emerald);border-color:var(--emerald);color:#fff}
  .ggroup{
    font-family:'Cormorant Garamond',serif;
    font-size:17px;font-weight:600;
    color:var(--emerald-deep);
    margin:18px 2px 6px;
  }
  .grow{
    display:flex;align-items:center;gap:10px;
    background:var(--card);
    border:1px solid var(--gold-soft);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:6px;
  }
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .gname{flex:1;font-size:14.5px}
  .gname small{display:block;font-size:10.5px;color:var(--muted);letter-spacing:.04em}
  .tag{
    font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    padding:2.5px 7px;border-radius:999px;flex:none;
  }
  .tag.maybe{background:#F0E7CF;color:#8A6C25}
  .tag.unlikely{background:#EFE0DC;color:var(--rose)}
  .seatbtn{
    flex:none;
    font-size:11px;letter-spacing:.06em;
    padding:5px 11px;border-radius:999px;
  }
  .seatbtn.at{background:var(--emerald);color:#fff}
  .seatbtn.free{color:var(--muted);border:1px dashed var(--gold-soft)}
  .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px}
  .btn{
    flex:1;min-width:130px;
    padding:12px 10px;
    border-radius:10px;
    font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    border:1px solid var(--emerald);
    color:var(--emerald);
    background:var(--card);
  }
  .btn.danger{border-color:var(--rose);color:var(--rose)}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:13px}

  /* ---------- bottom sheet ---------- */
  .scrim{
    position:fixed;inset:0;
    background:rgba(18,55,38,.45);
    z-index:10;
  }
  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    z-index:11;
    background:var(--card);
    border-radius:18px 18px 0 0;
    max-height:78vh;
    display:flex;flex-direction:column;
    box-shadow:0 -6px 30px rgba(18,55,38,.25);
    max-width:560px;margin:0 auto;
  }
  .sheet-hd{
    padding:16px 18px 10px;
    border-bottom:1px solid var(--gold-soft);
  }
  .sheet-hd .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .sheet-hd h2{
    font-family:'Cormorant Garamond',serif;
    font-size:24px;font-weight:600;color:var(--emerald-deep);
  }
  .sheet-hd .meta{font-size:11.5px;letter-spacing:.08em;color:var(--muted);margin-top:2px}
  .xbtn{
    width:32px;height:32px;border-radius:50%;
    background:var(--paper);color:var(--muted);
    font-size:15px;flex:none;
  }
  .cap{display:flex;align-items:center;gap:10px;margin-top:10px;font-size:12px;color:var(--muted);letter-spacing:.06em}
  .cap button{
    width:28px;height:28px;border-radius:50%;
    border:1px solid var(--gold-soft);
    font-size:15px;color:var(--emerald);
    line-height:1;
  }
  .cap button:disabled{opacity:.3}
  .cap b{color:var(--ink);font-weight:500}
  .sheet-body{overflow-y:auto;padding:12px 18px 26px;-webkit-overflow-scrolling:touch}
  .srow{
    display:flex;align-items:center;gap:10px;
    padding:9px 0;
    border-bottom:1px solid #F0EBDE;
    font-size:14.5px;
  }
  .srow .rm{color:var(--rose);font-size:11px;letter-spacing:.08em;padding:5px 8px}
  .addbtn{
    width:100%;
    margin-top:14px;
    padding:13px;
    border-radius:10px;
    background:var(--emerald);color:#fff;
    font-size:12px;letter-spacing:.14em;text-transform:uppercase;
  }
  .addbtn:disabled{background:var(--gold-soft);color:var(--muted)}
  .backlink{font-size:12px;letter-spacing:.08em;color:var(--gold);padding:4px 0}
</style>
</head>
<body>
<div id="app"></div>
<input type="file" id="importFile" accept="application/json,.json" hidden>
<script>
/* =====================================================================
   SAMPLE GUEST DATA — placeholder names only.
   Replace the lines below with the real list before use.
   Format (one guest per line):  First,Last,Family Group,Side,Status
     Side:   B = Bride · G = Groom · M = Mutual
     Status: D = Definite · M = Maybe · U = Unlikely
   ===================================================================== */
const RAW = `
Amelia,Wong,Wong Family,B,D
Benjamin,Wong,Wong Family,B,D
Catherine,Wong,Wong Family,B,D
Daniel,Wong,Wong Family,B,D

Isabel,Nguyen,Bride's Work,B,D

Kayla,Brooks,Bride's Work,B,D
Lena,Ward,Bride's Work,B,D
Mia,Sanders,Bride's Work,B,D
Nora,Diaz,Bride's Work,B,U
Alejandro,Roa,Roa Family,G,D
Beatriz,Roa,Roa Family,G,D
Carlos,Roa,Roa Family,G,D
Daniela,Roa,Roa Family,G,D
Eduardo,Roa,Roa Family,G,D
Fernanda,Roa,Roa Family,G,M
Gabriel,Roa,Roa Family,G,D
Helena,Roa,Roa Family,G,D
Ignacio,Roa,Roa Family,G,U
Julieta,Roa,Roa Family,G,D
Katia,Roa,Roa Family,G,D
Luis,Roa,Roa Family,G,M
Marisol,Garcia,Garcia Family,G,D
Nicolas,Garcia,Garcia Family,G,D
Ofelia,Garcia,Garcia Family,G,D
Pablo,Garcia,Garcia Family,G,M
Rosa,Garcia,Garcia Family,G,D
Santiago,Garcia,Garcia Family,G,D
Teresa,Garcia,Garcia Family,G,U
Ulises,Garcia,Garcia Family,G,D
Valeria,Martinez,Martinez Family,G,D
Wilson,Martinez,Martinez Family,G,D
Ximena,Martinez,Martinez Family,G,D
Yolanda,Martinez,Martinez Family,G,M
Zoe,Martinez,Martinez Family,G,D
Andres,Martinez,Martinez Family,G,D
Blake,Turner,Groom's College Friends,G,D
Cody,Hayes,Groom's College Friends,G,D
Derek,Lane,Groom's College Friends,G,M
Ethan,Price,Groom's College Friends,G,D
Felix,Grant,Groom's College Friends,G,D
Grant,Moss,Groom's College Friends,G,U
Hector,Vega,Groom's College Friends,G,D
Ivan,Silva,Groom's College Friends,G,D
Jared,Stone,Groom's Work,G,D
Kevin,Doyle,Groom's Work,G,M
Liam,Burke,Groom's Work,G,D
Marcus,Webb,Groom's Work,G,D
Noel,Fry,Groom's Work,G,D
Oscar,Pena,Groom's Work,G,U

Quinn,Avery,Mutual Friends,M,D

Sasha,Monroe,Mutual Friends,M,M

Vera,Costa,Mutual Friends,M,U
Wes,Boone,Mutual Friends,M,D
Yara,Solis,Mutual Friends,M,D
Zion,Marsh,Mutual Friends,M,M
Arthur,Finch,Neighbors,M,D
Betty,Finch,Neighbors,M,D
Cliff,Rowan,Neighbors,M,M
Dot,Rowan,Neighbors,M,D
`;

const GUESTS = RAW.trim().split('\n').map(l => l.split(',').map(s => s.trim()));
// each guest: [first, last, familyGroup, side, status]

const SIDE_COLOR = { B:'#B08A3C', G:'#1F5A40', M:'#8B8578' };
const SIDE_NAME  = { B:'Bride',   G:'Groom',   M:'Mutual'  };

/* 16 round tables — % coordinates on the floor plan.
   Two rows near the dance floor, then a lower wing. */
const TABLES = [
  {id:1,  x:11, y:22}, {id:2,  x:89, y:22},          // flanking the dance floor
  {id:3,  x:13, y:46}, {id:4,  x:37, y:48}, {id:5,  x:63, y:48}, {id:6,  x:87, y:46},
  {id:7,  x:13, y:62}, {id:8,  x:37, y:64}, {id:9,  x:63, y:64}, {id:10, x:87, y:62},
  {id:11, x:13, y:78}, {id:12, x:37, y:80}, {id:13, x:63, y:80}, {id:14, x:87, y:78},
  {id:15, x:30, y:93}, {id:16, x:54, y:93}           // lower wing
];
const DEFAULT_CAP = 10, MAX_CAP = 14;

const FIXTURES = [
  {label:'Band / DJ',        x:50, y:5,  w:34, h:6,  cls:''},
  {label:'Dance Floor',      x:50, y:19, w:38, h:16, cls:'dance'},
  {label:'Sweetheart Table', x:50, y:33, w:26, h:6,  cls:'sweetheart'},
  {label:'Cake',             x:8,  y:93, w:12, h:6,  cls:''},
  {label:'Gifts',            x:76, y:93, w:12, h:6,  cls:''},
  {label:'Bar',              x:92, y:93, w:11, h:6,  cls:''}
];

/* ---------------- state ---------------- */
const STORAGE_KEY = 'wongroa-seating-v1';
let state = { assignments:{}, capacities:{} };   // assignments: tableId -> [guestIdx]
let ui = { view:'floor', sheet:null, table:null, pickerSearch:'', listSearch:'', hideUnlikely:false };
// ui.sheet: null | 'table' | 'picker'

try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if (saved && saved.assignments) state = { assignments:saved.assignments||{}, capacities:saved.capacities||{} };
} catch(e) {}

let saveTimer;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 300);
}
function flushSave(){
  clearTimeout(saveTimer);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
addEventListener('pagehide', flushSave);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flushSave(); });

/* ---------------- helpers ---------------- */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function seatedAt(){                       // guestIdx -> tableId
  const m = {};
  for (const t in state.assignments) for (const g of state.assignments[t]) m[g] = +t;
  return m;
}
function tableGuests(id){ return state.assignments[id] || []; }
function tableCap(id){ return state.capacities[id] || DEFAULT_CAP; }
function seatedCount(){ return Object.values(state.assignments).reduce((n,a)=>n+a.length,0); }
function guestName(i){ return GUESTS[i][0] + ' ' + GUESTS[i][1]; }

/* ---------------- rendering ---------------- */
function render(){
  const app = document.getElementById('app');
  app.innerHTML = `
    <header class="hdr">
      <h1>Wong <span class="amp">&amp;</span> Roa</h1>
      <div class="sub">Emerald Ballroom &middot; Crystal Springs &middot; Nov 1, 2026</div>
      <div class="seated">${seatedCount()} of ${GUESTS.length} guests seated</div>
      <nav class="tabs">
        <button class="${ui.view==='floor'?'on':''}" onclick="showView('floor')">Floor Plan</button>
        <button class="${ui.view==='guests'?'on':''}" onclick="showView('guests')">Guest List</button>
      </nav>
    </header>
    <main>${ui.view==='floor' ? floorHTML() : guestsHTML()}</main>
    ${sheetHTML()}
  `;
}

function floorHTML(){
  const fixtures = FIXTURES.map(f => `
    <div class="fixture ${f.cls}" style="left:${f.x}%;top:${f.y}%;width:${f.w}%;height:${f.h}%">${f.label}</div>
  `).join('');
  const tables = TABLES.map(t => {
    const n = tableGuests(t.id).length, cap = tableCap(t.id);
    const fill = Math.min(100, Math.round(n/cap*100));
    return `
      <button class="table ${n>=cap?'full':''}" style="left:${t.x}%;top:${t.y}%;--fill:${fill}" onclick="openTable(${t.id})">
        <span class="table-in">
          <span class="num">${t.id}</span>
          <span class="cnt">${n}/${cap}</span>
        </span>
      </button>`;
  }).join('');
  return `
    <div class="plan">${fixtures}${tables}</div>
    <div class="legend">
      <span><i style="background:${SIDE_COLOR.B}"></i>Bride</span>
      <span><i style="background:${SIDE_COLOR.G}"></i>Groom</span>
      <span><i style="background:${SIDE_COLOR.M}"></i>Mutual</span>
    </div>`;
}

function guestRowsHTML(){
  const at = seatedAt();
  const q = ui.listSearch.toLowerCase();
  let html = '', lastGroup = null, shown = 0;
  GUESTS.forEach((g,i) => {
    if (ui.hideUnlikely && g[4]==='U') return;
    if (q && !(g[0]+' '+g[1]+' '+g[2]).toLowerCase().includes(q)) return;
    if (g[2] !== lastGroup){ html += `<div class="ggroup">${esc(g[2])}</div>`; lastGroup = g[2]; }
    const t = at[i];
    html += `
      <div class="grow">
        <span class="dot" style="background:${SIDE_COLOR[g[3]]}"></span>
        <span class="gname">${esc(g[0])} ${esc(g[1])}<small>${SIDE_NAME[g[3]]}</small></span>
        ${g[4]==='M' ? '<span class="tag maybe">Maybe</span>' : ''}
        ${g[4]==='U' ? '<span class="tag unlikely">Unlikely</span>' : ''}
        ${t ? `<button class="seatbtn at" onclick="unseat(${i})">Table ${t}</button>`
            : `<span class="seatbtn free">Unseated</span>`}
      </div>`;
    shown++;
  });
  return shown ? html : '<div class="empty">No guests match.</div>';
}

function guestsHTML(){
  return `
    <div class="toolbar">
      <input class="search" id="listSearch" type="search" placeholder="Search guests&hellip;"
             value="${esc(ui.listSearch)}" oninput="onListSearch(this.value)">
      <button class="chip ${ui.hideUnlikely?'on':''}" onclick="toggleUnlikely()">Hide unlikely</button>
    </div>
    <div id="guestRows">${guestRowsHTML()}</div>
    <div class="actions">
      <button class="btn" onclick="exportJSON()">Export JSON</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <button class="btn danger" onclick="clearAll()">Clear all assignments</button>
    </div>`;
}

/* ---------------- bottom sheet ---------------- */
function sheetHTML(){
  if (!ui.sheet) return '';
  const id = ui.table;
  let body;
  if (ui.sheet === 'table'){
    const guests = tableGuests(id), cap = tableCap(id);
    const rows = guests.map(i => {
      const g = GUESTS[i];
      return `
        <div class="srow">
          <span class="dot" style="background:${SIDE_COLOR[g[3]]}"></span>
          <span class="gname">${esc(guestName(i))}<small>${esc(g[2])}</small></span>
          <button class="rm" onclick="unseat(${i})">Unseat</button>
        </div>`;
    }).join('') || '<div class="empty">No one seated yet.</div>';
    body = `
      <div class="sheet-hd">
        <div class="row">
          <div>
            <h2>Table ${id}</h2>
            <div class="meta">${guests.length} of ${cap} seats filled</div>
          </div>
          <button class="xbtn" onclick="closeSheet()">&#10005;</button>
        </div>
        <div class="cap">
          Capacity
          <button onclick="capChange(-1)" ${cap<=Math.max(1,guests.length)?'disabled':''}>&minus;</button>
          <b>${cap}</b>
          <button onclick="capChange(1)" ${cap>=MAX_CAP?'disabled':''}>+</button>
        </div>
      </div>
      <div class="sheet-body">
        ${rows}
        <button class="addbtn" onclick="openPicker()" ${guests.length>=cap?'disabled':''}>
          ${guests.length>=cap ? 'Table full' : 'Add guests'}
        </button>
      </div>`;
  } else { // picker
    body = `
      <div class="sheet-hd">
        <div class="row">
          <div>
            <button class="backlink" onclick="openTable(${id})">&larr; Table ${id}</button>
            <h2>Add guests</h2>
            <div class="meta">${tableGuests(id).length} of ${tableCap(id)} seats filled</div>
          </div>
          <button class="xbtn" onclick="closeSheet()">&#10005;</button>
        </div>
        <input class="search" id="pickerSearch" type="search" placeholder="Search unseated guests&hellip;"
               style="margin-top:10px;width:100%" value="${esc(ui.pickerSearch)}" oninput="onPickerSearch(this.value)">
      </div>
      <div class="sheet-body" id="pickerList">${pickerListHTML()}</div>`;
  }
  return `<div class="scrim" onclick="closeSheet()"></div><div class="sheet">${body}</div>`;
}

function pickerListHTML(){
  const at = seatedAt();
  const q = ui.pickerSearch.toLowerCase();
  let html = '', lastGroup = null, shown = 0;
  GUESTS.forEach((g,i) => {
    if (at[i] !== undefined) return;
    if (q && !(g[0]+' '+g[1]+' '+g[2]).toLowerCase().includes(q)) return;
    if (g[2] !== lastGroup){ html += `<div class="ggroup">${esc(g[2])}</div>`; lastGroup = g[2]; }
    html += `
      <div class="grow" onclick="seat(${i})" style="cursor:pointer">
        <span class="dot" style="background:${SIDE_COLOR[g[3]]}"></span>
        <span class="gname">${esc(g[0])} ${esc(g[1])}<small>${SIDE_NAME[g[3]]}</small></span>
        ${g[4]==='M' ? '<span class="tag maybe">Maybe</span>' : ''}
        ${g[4]==='U' ? '<span class="tag unlikely">Unlikely</span>' : ''}
      </div>`;
    shown++;
  });
  return shown ? html : '<div class="empty">Everyone matching is already seated.</div>';
}

/* ---------------- actions (global for onclick) ---------------- */
window.showView = v => { ui.view = v; ui.listSearch=''; render(); };
window.openTable = id => { ui.sheet='table'; ui.table=id; ui.pickerSearch=''; render(); };
window.closeSheet = () => { ui.sheet=null; ui.table=null; render(); };
window.openPicker = () => { ui.sheet='picker'; ui.pickerSearch=''; render(); const s=document.getElementById('pickerSearch'); if(s) s.focus(); };

window.seat = i => {
  const id = ui.table;
  if (!id) return;
  const arr = state.assignments[id] || (state.assignments[id]=[]);
  if (arr.length >= tableCap(id)) { window.openTable(id); return; }
  if (!arr.includes(i)) arr.push(i);
  save();
  if (arr.length >= tableCap(id)) window.openTable(id);   // table filled — back to table view
  else {
    // stay in picker; refresh the list + seat count without losing search focus
    document.getElementById('pickerList').innerHTML = pickerListHTML();
    const meta = document.querySelector('.sheet .meta');
    if (meta) meta.textContent = `${arr.length} of ${tableCap(id)} seats filled`;
    const hdrCount = document.querySelector('.hdr .seated');
    if (hdrCount) hdrCount.textContent = `${seatedCount()} of ${GUESTS.length} guests seated`;
  }
};

window.unseat = i => {
  if (!confirm(`Unseat ${guestName(i)}?`)) return;
  for (const t in state.assignments){
    const k = state.assignments[t].indexOf(i);
    if (k > -1){ state.assignments[t].splice(k,1); if(!state.assignments[t].length) delete state.assignments[t]; }
  }
  save(); render();
};

window.capChange = d => {
  const id = ui.table;
  const next = Math.min(MAX_CAP, Math.max(Math.max(1, tableGuests(id).length), tableCap(id)+d));
  state.capacities[id] = next;
  save(); render();
};

window.toggleUnlikely = () => { ui.hideUnlikely = !ui.hideUnlikely; render(); };

window.onListSearch = v => {
  ui.listSearch = v;
  document.getElementById('guestRows').innerHTML = guestRowsHTML();
};
window.onPickerSearch = v => {
  ui.pickerSearch = v;
  document.getElementById('pickerList').innerHTML = pickerListHTML();
};

window.clearAll = () => {
  if (!confirm('Clear ALL seating assignments? This cannot be undone.')) return;
  state.assignments = {};
  save(); render();
};

/* export / import — assignments stored by guest NAME so snapshots survive
   reordering of the guest list */
window.exportJSON = () => {
  const out = { v:1, exported:new Date().toISOString(), capacities:state.capacities, assignments:{} };
  for (const t in state.assignments) out.assignments[t] = state.assignments[t].map(guestName);
  const blob = new Blob([JSON.stringify(out,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wong-roa-seating.json';
  a.click();
  URL.revokeObjectURL(a.href);
};

document.getElementById('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || typeof data.assignments !== 'object') throw new Error('bad format');
      const byName = {};
      GUESTS.forEach((g,i) => byName[g[0]+' '+g[1]] = i);
      const assignments = {}, missing = [];
      for (const t in data.assignments){
        const idxs = [];
        for (const name of data.assignments[t]){
          if (byName[name] !== undefined) idxs.push(byName[name]);
          else missing.push(name);
        }
        if (idxs.length) assignments[t] = idxs;
      }
      if (!confirm('Replace the current seating plan with the imported one?')) return;
      state.assignments = assignments;
      state.capacities = (data.capacities && typeof data.capacities==='object') ? data.capacities : {};
      save(); render();
      if (missing.length) alert('Not found in guest list (skipped):\n' + missing.join('\n'));
    } catch(err){
      alert('Could not read that file — it doesn’t look like a seating export.');
    }
  };
  reader.readAsText(file);
});

render();
</script>
</body>
</html>
